<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoutPGH Schedule Builder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- PDF export libraries (no print dialog) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-logo-wrap">
        <img src="stoutpgh-logo.png" class="sb-logo" alt="StoutPGH"
          onerror="this.style.display='none';document.getElementById('sbLogoFb').style.display='block'">
        <span id="sbLogoFb" class="sb-logo-fb" style="display:none">STOUTPGH</span>
      </div>
      <div class="sb-sub">Schedule Builder</div>
      <div class="tab-row" id="tabRow"></div>
    </div>

    <!-- Sidebar body populated by app.js -->
    <div class="sb-body" id="sbBody"></div>

    <div class="sb-footer">
      <!-- Manual save to localStorage -->
      <button class="save-local-btn" onclick="saveToLocalStorage()">
        <i class="fas fa-save"></i>&nbsp; Save to Browser
      </button>
      <!-- Split export button -->
      <div class="exp-split">
        <button class="exp-split-left" onclick="exportPDF()" title="Export current schedule tab as PDF">
          <i class="fas fa-file-pdf"></i> Export Page
        </button>
        <div class="exp-split-divider"></div>
        <button class="exp-split-right" onclick="exportAllPDF()" title="Export all 3 schedules as one PDF">
          All&nbsp;<i class="fas fa-layer-group"></i>
        </button>
      </div>
      <!-- Schedule data save / load -->
      <button class="data-btn new-sched-btn" onclick="newSchedule()">
        <i class="fas fa-file"></i>&nbsp; New Schedule
      </button>
      <button class="data-btn" onclick="saveData()">
        <i class="fas fa-download"></i>&nbsp; Save Schedule (.json)
      </button>
      <button class="data-btn" onclick="loadData()">
        <i class="fas fa-upload"></i>&nbsp; Load Schedule (.json)
      </button>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="mode-pill edit" id="modePill"></div>
    <div id="flyerWrap"></div>
  </div>

</div>

<!-- Block Modal — closes only via X, Cancel, or Save buttons -->
<div class="bm-overlay" id="blockModal"></div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu"></div>
<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
